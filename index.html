<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KN Cataloger Elite</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @font-face { 
            font-family: 'SFProMedium'; 
            src: url('SFPRODISPLAYMEDIUM.woff2') format('woff2'); 
        }

        body { background-color: #ffe7e5; font-family: 'Segoe UI', sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 12px; }
        
        .btn-brand, label.upload-label, .id-tag, .clear-btn { 
            background: #9168ad; color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center;
        }

        .id-input-group { grid-column: span 2; display: flex; border: 2px solid #9168ad; border-radius: 10px; overflow: hidden; background: white; height: 40px;}
        input[type="text"] { flex-grow: 1; border: none; padding: 0 10px; outline: none; font-size: 16px; }

        .selection-container { 
            grid-column: span 2; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            border: 2px solid #9168ad; 
            color: #9168ad; 
            font-weight: bold;
        }
        
        .selection-container label { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            cursor: pointer;
            font-size: 13px;
        }

        #preview-container { 
            width: 100%; max-width: 500px; aspect-ratio: 1 / 1; 
            border: 2px solid #9168ad; background: #fff; position: relative;
            touch-action: none; overflow: hidden; cursor: grab;
        }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <div class="controls">
        <label for="upload" class="upload-label">insert photo here</label>
        <input type="file" id="upload" hidden accept="image/*">
        <button id="download" class="btn-brand">Download photo</button>

        <div class="id-input-group">
            <div class="id-tag">Photo ID</div>
            <input type="text" id="photoId" placeholder="Type number...">
            <button id="clearId" class="clear-btn">✕</button>
        </div>

        <div class="selection-container">
            <label><input type="radio" name="cat" value="" checked> None</label>
            <label><input type="radio" name="cat" value="Earring"> Earring</label>
            <label><input type="radio" name="cat" value="Necklace"> Necklace</label>
            <label><input type="radio" name="cat" value="Bracelet"> Bracelet</label>
            <label><input type="radio" name="cat" value="Ring"> Ring</label>
            <label><input type="radio" name="cat" value="Wedding Ring"> Wedding Ring</label>
            <label><input type="radio" name="cat" value="Anklet"> Anklet</label>
        </div>

        <div class="selection-container" style="justify-content: space-around;">
            <label><input type="radio" name="wm" value="white" checked> White Logo</label>
            <label><input type="radio" name="wm" value="purple"> Purple Logo</label>
        </div>
    </div>

    <div id="preview-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('preview-container');
        const photoId = document.getElementById('photoId');
        
        const watermarks = { white: new Image(), purple: new Image() };
        watermarks.white.src = 'white.png';
        watermarks.purple.src = 'purple.png';

        let baseImage = null;
        let imgX = 0, imgY = 0, imgScale = 1;
        let isDragging = false, lastX, lastY, lastDist = 0;
        const activePointers = new Map();

        const savedID = localStorage.getItem('lastKN_ID');
        if (savedID) photoId.placeholder = "Last: " + savedID;

        function draw() {
            const size = 1200;
            canvas.width = size; canvas.height = size;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, size, size);

            if (baseImage) ctx.drawImage(baseImage, imgX, imgY, baseImage.width * imgScale, baseImage.height * imgScale);

            const selectedWM = document.querySelector('input[name="wm"]:checked').value;
            if (watermarks[selectedWM].complete) ctx.drawImage(watermarks[selectedWM], 0, 0, size, size);

            const rawID = photoId.value.trim();
            const category = document.querySelector('input[name="cat"]:checked').value;
            
            const margin = size * 0.03;
            const badgeHeight = size * 0.07;
            
            // REDUCED VERTICAL SPACE HERE
            const spacing = size * 0.004; 

            let categoryOffset = 0;
            if (category) {
                ctx.font = `500 ${size * 0.04}px "SFProMedium"`;
                const catWidth = ctx.measureText(category).width;
                const p = size * 0.02;
                ctx.fillStyle = "#9168ad";
                ctx.beginPath();
                ctx.roundRect(margin, margin, catWidth + (p * 2), badgeHeight, size * 0.02);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.textBaseline = "middle";
                ctx.fillText(category, margin + p, margin + (badgeHeight / 2));
                categoryOffset = badgeHeight + spacing;
            }

            if (rawID) {
                const fullText = "KN" + rawID;
                ctx.font = `500 ${size * 0.04}px "SFProMedium"`;
                const idWidth = ctx.measureText(fullText).width;
                const p = size * 0.02;
                ctx.fillStyle = "#9168ad";
                ctx.beginPath();
                ctx.roundRect(margin, margin + categoryOffset, idWidth + (p * 2), badgeHeight, size * 0.02);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.textBaseline = "middle";
                ctx.fillText(fullText, margin + p, margin + categoryOffset + (badgeHeight / 2));
            }
        }

        // --- Standard Logic ---
        photoId.addEventListener('input', draw);
        document.getElementsByName('cat').forEach(r => r.addEventListener('change', draw));
        document.getElementsByName('wm').forEach(r => r.addEventListener('change', draw));
        
        document.getElementById('clearId').addEventListener('click', () => {
            if (photoId.value) {
                localStorage.setItem('lastKN_ID', photoId.value);
                photoId.placeholder = "Last: " + photoId.value;
                photoId.value = "";
                document.querySelector('input[name="cat"][value=""]').checked = true;
                draw();
            }
        });

        document.getElementById('upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => { 
                    baseImage = img; 
                    imgScale = 1200 / Math.max(img.width, img.height);
                    imgX = (1200 - img.width * imgScale) / 2;
                    imgY = (1200 - img.height * imgScale) / 2;
                    draw(); 
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        container.addEventListener('pointerdown', (e) => {
            isDragging = true; lastX = e.clientX; lastY = e.clientY;
            container.setPointerCapture(e.pointerId);
        });

        container.addEventListener('pointermove', (e) => {
            activePointers.set(e.pointerId, e);
            if (activePointers.size === 2) {
                const pts = Array.from(activePointers.values());
                const dist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                if (lastDist > 0) {
                    const factor = dist / lastDist;
                    const midX = (pts[0].clientX + pts[1].clientX) / 2, midY = (pts[0].clientY + pts[1].clientY) / 2;
                    const rect = container.getBoundingClientRect();
                    const cX = (midX - rect.left) * (canvas.width / rect.width), cY = (midY - rect.top) * (canvas.height / rect.height);
                    imgX = cX - (cX - imgX) * factor; imgY = cY - (cY - imgY) * factor; imgScale *= factor;
                }
                lastDist = dist;
            } else if (isDragging && activePointers.size === 1) {
                imgX += (e.clientX - lastX) * (canvas.width / container.clientWidth);
                imgY += (e.clientY - lastY) * (canvas.height / container.clientHeight);
                lastX = e.clientX; lastY = e.clientY;
            }
            draw();
        });

        container.addEventListener('pointerup', (e) => {
            activePointers.delete(e.pointerId);
            if (activePointers.size < 2) lastDist = 0;
            if (activePointers.size === 0) isDragging = false;
        });

        document.getElementById('download').addEventListener('click', () => {
            if(!baseImage) return;
            const data = canvas.toDataURL('image/png');
            if(/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                const overlay = document.createElement('div');
                overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;";
                overlay.innerHTML = `<p style="color:white; font-weight:bold;">Long press to Save to Photos</p><img src="${data}" style="max-width:100%; border:2px solid white;"><button onclick="this.parentElement.remove()" class="btn-brand" style="margin-top:20px;">Close</button>`;
                document.body.appendChild(overlay);
            } else {
                const link = document.createElement('a');
                link.download = `KN${photoId.value || 'Export'}.png`;
                link.href = data; link.click();
            }
        });

        watermarks.white.onload = draw; watermarks.purple.onload = draw;
        document.fonts.load('10pt "SFProMedium"').then(draw);
    </script>
</body>
</html>
