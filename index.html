<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KN Cataloger Elite</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @font-face { 
            font-family: 'SFProMedium'; 
            src: url('SFPRODISPLAYMEDIUM.woff2') format('woff2'); 
        }

        body { 
            background-color: #ffe7e5; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box;
            padding: 15px; 
            padding-top: calc(15px + env(safe-area-inset-top));
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 12px; }
        
        .btn-brand, label.upload-label, .id-tag, .clear-btn { 
            background: #9168ad; color: white; border: none; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center;
        }

        .id-input-group { grid-column: span 2; display: flex; border: 2px solid #9168ad; border-radius: 10px; overflow: hidden; background: white; height: 40px;}
        input[type="text"] { flex-grow: 1; border: none; padding: 0 10px; outline: none; font-size: 16px; }

        .selection-container { 
            grid-column: span 2; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            border: 2px solid #9168ad; 
            color: #9168ad; 
            font-weight: bold;
        }
        
        .selection-container label { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            cursor: pointer;
            font-size: 13px;
        }

        #preview-container { 
            width: 100%; max-width: 500px; 
            border: 2px solid #9168ad; background: #fff; position: relative;
            touch-action: none; overflow: hidden; cursor: grab;
            display: flex; align-items: center; justify-content: center;
        }
        
        .ratio-square { aspect-ratio: 1 / 1; }
        .ratio-landscape { aspect-ratio: 4 / 3; }
        .ratio-portrait { aspect-ratio: 3 / 4; }
        .ratio-video { aspect-ratio: 9 / 16; }
        
        canvas { width: 100%; height: 100%; display: block; }
        
        #hidden-video { display: none; }
    </style>
</head>
<body>

    <div class="controls">
        <label for="upload" class="upload-label">Insert Media</label>
        <input type="file" id="upload" hidden accept="image/*,video/*">
        
        <button id="download" class="btn-brand">Download Result</button>

        <div class="id-input-group">
            <div class="id-tag">ID</div>
            <input type="text" id="photoId" placeholder="Type number...">
            <button id="clearId" class="clear-btn">✕</button>
        </div>

        <div class="selection-container">
            <label><input type="checkbox" name="cat" value="Earring"> Earring</label>
            <label><input type="checkbox" name="cat" value="Necklace"> Necklace</label>
            <label><input type="checkbox" name="cat" value="Bracelet"> Bracelet</label>
            <label><input type="checkbox" name="cat" value="Ring"> Ring</label>
            <label><input type="checkbox" name="cat" value="Wedding Ring"> Wedding Ring</label>
            <label><input type="checkbox" name="cat" value="Anklet"> Anklet</label>
        </div>

        <div class="selection-container" style="justify-content: space-between;">
            <label><input type="radio" name="ratio" value="square" checked> Sq</label>
            <label><input type="radio" name="ratio" value="landscape"> 4:3 L</label>
            <label><input type="radio" name="ratio" value="portrait"> 4:3 P</label>
            <label><input type="radio" name="ratio" value="video"> 9:16 Video</label>
        </div>

        <div class="selection-container" style="justify-content: space-around;">
            <label><input type="radio" name="wm" value="white" checked> White</label>
            <label><input type="radio" name="wm" value="purple"> Purple</label>
            <label><input type="radio" name="wm" value="four-three-wm"> Logo Only</label>
            <label><input type="radio" name="wm" value="video-wm"> Video Logo</label>
        </div>
    </div>

    <div id="preview-container" class="ratio-square">
        <canvas id="canvas"></canvas>
    </div>

    <video id="hidden-video" loop muted playsinline></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('preview-container');
        const photoId = document.getElementById('photoId');
        const videoElement = document.getElementById('hidden-video');
        
        const watermarks = { 
            white: new Image(), 
            purple: new Image(),
            'four-three-wm': new Image(),
            'video-wm': new Image() 
        };
        watermarks.white.src = 'white.png';
        watermarks.purple.src = 'purple.png';
        watermarks['four-three-wm'].src = '4x3.png';
        watermarks['video-wm'].src = 'Watermark for video.png';

        let baseImage = null;
        let isVideoMode = false;
        let imgX = 0, imgY = 0, imgScale = 1;
        let isDragging = false, lastX, lastY, lastDist = 0;
        const activePointers = new Map();

        function fitMediaToCanvas(width, height, canvasW, canvasH) {
            const scale = Math.max(canvasW / width, canvasH / height);
            imgScale = scale;
            imgX = (canvasW - width * scale) / 2;
            imgY = (canvasH - height * scale) / 2;
        }

        function draw() {
            const ratio = document.querySelector('input[name="ratio"]:checked').value;
            let canvasW = 1200, canvasH = 1200;

            container.className = "";
            if (ratio === 'square') {
                container.classList.add('ratio-square');
                canvasW = 1200; canvasH = 1200;
            } else if (ratio === 'landscape') {
                container.classList.add('ratio-landscape');
                canvasW = 1200; canvasH = 900;
            } else if (ratio === 'portrait') {
                container.classList.add('ratio-portrait');
                canvasW = 900; canvasH = 1200;
            } else if (ratio === 'video') {
                container.classList.add('ratio-video');
                canvasW = 1080; canvasH = 1920;
            }

            if (canvas.width !== canvasW || canvas.height !== canvasH) {
                canvas.width = canvasW; canvas.height = canvasH;
            }

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvasW, canvasH);

            if (isVideoMode) {
                ctx.drawImage(videoElement, imgX, imgY, videoElement.videoWidth * imgScale, videoElement.videoHeight * imgScale);
            } else if (baseImage) {
                ctx.drawImage(baseImage, imgX, imgY, baseImage.width * imgScale, baseImage.height * imgScale);
            }

            const selectedWM = document.querySelector('input[name="wm"]:checked').value;
            if (watermarks[selectedWM].complete) {
                const wm = watermarks[selectedWM];
                
                // Drawing logic for different watermarks
                if (selectedWM === 'video-wm' || selectedWM === 'white' || selectedWM === 'purple') {
                    // Full-sized overlays
                    ctx.drawImage(wm, 0, 0, canvasW, canvasH);
                } else if (selectedWM === 'four-three-wm') {
                    // Centered dynamic Logo Only
                    const logoWidthRatio = (ratio === 'portrait' || ratio === 'video') ? 0.35 : 0.25;
                    const logoScale = (canvasW * logoWidthRatio) / wm.width;
                    const logW = wm.width * logoScale;
                    const logH = wm.height * logoScale;
                    const x = (canvasW - logW) / 2;
                    const y = canvasH - logH - (canvasH * 0.03);
                    ctx.drawImage(wm, x, y, logW, logH);
                }
            }

            const rawID = photoId.value.trim();
            const refSize = Math.min(canvasW, canvasH);
            const margin = refSize * 0.03;
            const badgeHeight = refSize * 0.07;
            const spacing = refSize * 0.004; 

            let currentYOffset = margin;
            document.querySelectorAll('input[name="cat"]:checked').forEach(cb => {
                ctx.font = `500 ${refSize * 0.04}px "SFProMedium"`;
                const catWidth = ctx.measureText(cb.value).width;
                const p = refSize * 0.02;
                ctx.fillStyle = "#9168ad";
                ctx.beginPath();
                ctx.roundRect(margin, currentYOffset, catWidth + (p * 2), badgeHeight, refSize * 0.02);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.textBaseline = "middle";
                ctx.fillText(cb.value, margin + p, currentYOffset + (badgeHeight / 2));
                currentYOffset += badgeHeight + spacing;
            });

            if (rawID) {
                const fullText = "KN" + rawID;
                ctx.font = `500 ${refSize * 0.04}px "SFProMedium"`;
                const idWidth = ctx.measureText(fullText).width;
                const p = refSize * 0.02;
                ctx.fillStyle = "#9168ad";
                ctx.beginPath();
                ctx.roundRect(margin, currentYOffset, idWidth + (p * 2), badgeHeight, refSize * 0.02);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.textBaseline = "middle";
                ctx.fillText(fullText, margin + p, currentYOffset + (badgeHeight / 2));
            }

            if (isVideoMode && !videoElement.paused) {
                requestAnimationFrame(draw);
            }
        }

        // Logic for ratio switching
        document.getElementsByName('ratio').forEach(r => r.addEventListener('change', () => {
            const ratio = r.value;
            
            if (ratio === 'video') {
                document.querySelector('input[name="wm"][value="video-wm"]').checked = true;
            } else if (ratio === 'landscape' || ratio === 'portrait') {
                document.querySelector('input[name="wm"][value="four-three-wm"]').checked = true;
            } else {
                document.querySelector('input[name="wm"][value="white"]').checked = true;
            }

            if (isVideoMode) {
                const cW = ratio === 'video' ? 1080 : (ratio === 'portrait' ? 900 : 1200);
                const cH = ratio === 'video' ? 1920 : (ratio === 'landscape' ? 900 : 1200);
                fitMediaToCanvas(videoElement.videoWidth, videoElement.videoHeight, cW, cH);
            } else if (baseImage) {
                const cW = ratio === 'video' ? 1080 : (ratio === 'portrait' ? 900 : 1200);
                const cH = ratio === 'video' ? 1920 : (ratio === 'landscape' ? 900 : 1200);
                fitMediaToCanvas(baseImage.width, baseImage.height, cW, cH);
            }
            draw();
        }));

        // The rest of your event listeners and MediaRecorder logic remains the same...
        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type.startsWith('video/')) {
                isVideoMode = true;
                baseImage = null;
                videoElement.src = URL.createObjectURL(file);
                videoElement.onloadedmetadata = () => {
                    document.querySelector('input[name="ratio"][value="video"]').checked = true;
                    fitMediaToCanvas(videoElement.videoWidth, videoElement.videoHeight, 1080, 1920);
                    // Force the Watermark selection based on the radio check above
                    document.querySelector('input[name="wm"][value="video-wm"]').checked = true;
                    videoElement.play();
                    draw();
                };
            } else {
                isVideoMode = false;
                const reader = new FileReader();
                reader.onload = (f) => {
                    const img = new Image();
                    img.onload = () => { 
                        baseImage = img; 
                        const ratio = document.querySelector('input[name="ratio"]:checked').value;
                        const cW = ratio === 'portrait' ? 900 : (ratio === 'video' ? 1080 : 1200);
                        const cH = ratio === 'landscape' ? 900 : (ratio === 'video' ? 1920 : 1200);
                        fitMediaToCanvas(img.width, img.height, cW, cH);
                        draw(); 
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('download').addEventListener('click', async () => {
            if (isVideoMode) {
                const stream = canvas.captureStream(30);
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                videoElement.currentTime = 0;
                videoElement.play();
                recorder.start();
                videoElement.onended = () => recorder.stop();
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `KN_Video.webm`; a.click();
                };
                recorder.ondataavailable = e => chunks.push(e.data);
            } else {
                const data = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = data; a.download = `KN${photoId.value || 'Export'}.png`; a.click();
            }
        });

        photoId.addEventListener('input', () => { if(!isVideoMode) draw(); });
        document.getElementsByName('cat').forEach(cb => cb.addEventListener('change', () => { if(!isVideoMode) draw(); }));
        document.getElementsByName('wm').forEach(r => r.addEventListener('change', draw));

        container.addEventListener('pointerdown', (e) => {
            isDragging = true; lastX = e.clientX; lastY = e.clientY;
            container.setPointerCapture(e.pointerId);
        });
        container.addEventListener('pointermove', (e) => {
            activePointers.set(e.pointerId, e);
            const rect = container.getBoundingClientRect();
            if (activePointers.size === 1 && isDragging) {
                imgX += (e.clientX - lastX) * (canvas.width / rect.width);
                imgY += (e.clientY - lastY) * (canvas.height / rect.height);
                lastX = e.clientX; lastY = e.clientY;
            }
            if(!isVideoMode) draw();
        });
        container.addEventListener('pointerup', (e) => {
            activePointers.delete(e.pointerId);
            if (activePointers.size === 0) isDragging = false;
        });

        watermarks.white.onload = draw;
        watermarks.purple.onload = draw;
        watermarks['four-three-wm'].onload = draw;
        watermarks['video-wm'].onload = draw;
    </script>
</body>
</html>
